<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>EDGE GeoIntelligence – Client Portal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --green-900: #0f2a1a; --green-700: #1b4332; --green-600: #2d6a4f;
      --green-500: #40916c; --green-400: #52b788; --green-100: #d8f3dc; --green-50: #f0faf3;
      --blue-700: #1e3a5f; --blue-600: #1d4e89; --blue-500: #2a6cb0;
      --blue-400: #3a86c8; --blue-100: #dbeaf8; --blue-50: #eef5fc;
      --ink: #101828; --ink-soft: #344054; --ink-muted: #667085;
      --line: #d0d5dd; --surface: #f9fafb; --white: #ffffff;
      --radius-card: 12px; --radius-input: 8px;
      --shadow-card: 0 1px 3px rgba(16,24,40,0.08), 0 1px 2px rgba(16,24,40,0.06);
      --shadow-pop: 0 12px 24px -8px rgba(16,24,40,0.18), 0 4px 8px -2px rgba(16,24,40,0.08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; font-family: "Inter","Segoe UI",Roboto,-apple-system,sans-serif;
      background: var(--surface); color: var(--ink); line-height: 1.55;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      background:
        radial-gradient(1200px 300px at 80% -20%, rgba(58,134,200,0.12), transparent 70%),
        radial-gradient(1000px 300px at 20% -10%, rgba(82,183,136,0.15), transparent 70%),
        linear-gradient(180deg, var(--green-700) 0%, var(--blue-700) 35%, var(--surface) 60%);
    }
    main {
      max-width: 680px; margin: 0 auto; padding: 40px 20px 64px;
    }

    /* ---- Hero ---- */
    .hero {
      text-align: center; margin-bottom: 40px;
    }
    .hero .logo {
      display: inline-flex; align-items: center; gap: 10px;
      background: rgba(255,255,255,0.12); color: var(--white);
      padding: 8px 20px; border-radius: 100px;
      font-size: 0.85rem; font-weight: 600; letter-spacing: 0.04em;
      margin-bottom: 24px; backdrop-filter: blur(6px);
    }
    .hero .logo .pulse {
      width: 10px; height: 10px; border-radius: 50%;
      background: var(--green-400); box-shadow: 0 0 0 4px rgba(82,183,136,0.3);
    }
    .hero h1 {
      margin: 0 0 12px; font-size: 2rem; font-weight: 700;
      color: var(--white); letter-spacing: -0.02em;
    }
    .hero p {
      margin: 0; font-size: 1.05rem; color: rgba(255,255,255,0.8);
      max-width: 480px; margin-left: auto; margin-right: auto;
    }

    /* ---- Cards ---- */
    .card-grid { display: grid; gap: 20px; }

    .portal-card {
      background: var(--white); border: 1px solid var(--line);
      border-radius: var(--radius-card); box-shadow: var(--shadow-card);
      padding: 28px 32px; text-decoration: none; color: inherit;
      display: flex; align-items: flex-start; gap: 20px;
      transition: box-shadow 0.2s, transform 0.15s, border-color 0.2s;
      position: relative; overflow: hidden;
    }
    .portal-card:hover {
      box-shadow: var(--shadow-pop); transform: translateY(-2px);
      border-color: var(--green-400);
    }
    .portal-card:first-child:hover { border-color: var(--green-400); }
    .portal-card:last-child:hover { border-color: var(--blue-400); }

    .portal-card::before {
      content: ""; position: absolute; top: 0; left: 0;
      width: 4px; height: 100%;
    }
    .portal-card:first-child::before { background: var(--green-500); }
    .portal-card:last-child::before { background: var(--blue-500); }

    .card-icon {
      flex-shrink: 0; width: 48px; height: 48px; border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.4rem; font-weight: 700; color: var(--white);
    }
    .portal-card:first-child .card-icon { background: var(--green-500); }
    .portal-card:last-child .card-icon { background: var(--blue-500); }

    .card-body { flex: 1; }
    .card-body h2 { margin: 0 0 4px; font-size: 1.15rem; font-weight: 600; }
    .card-body p { margin: 0; font-size: 0.88rem; color: var(--ink-muted); }
    .card-body .badge {
      display: inline-block; margin-top: 10px;
      font-size: 0.72rem; font-weight: 600; letter-spacing: 0.06em;
      text-transform: uppercase; padding: 2px 8px; border-radius: 100px;
    }
    .portal-card:first-child .badge { background: var(--green-50); color: var(--green-700); }
    .portal-card:last-child .badge { background: var(--blue-50); color: var(--blue-700); }

    .card-arrow {
      flex-shrink: 0; font-size: 1.3rem; color: var(--ink-muted);
      align-self: center; transition: transform 0.2s;
    }
    .portal-card:hover .card-arrow { transform: translateX(4px); }

    /* ---- Footer ---- */
    .site-footer {
      text-align: center; margin-top: 48px; padding-top: 20px;
      border-top: 1px solid var(--line);
      font-size: 0.8rem; color: var(--ink-muted);
    }

    @media (max-width: 480px) {
      .portal-card { flex-direction: column; gap: 12px; padding: 22px; }
      .card-arrow { align-self: flex-end; }
      .hero h1 { font-size: 1.5rem; }
    }
  </style>
</head>
<body>
  <main>
    <div class="hero">
      <div class="logo"><span class="pulse"></span> EDGE GeoIntelligence</div>
      <h1>Client Portal</h1>
      <p>Submit your project details for assessment and quoting.</p>
    </div>

    <div class="card-grid">

      <a href="upload-form.html" class="portal-card">
        <div class="card-icon">1</div>
        <div class="card-body">
          <h2>Project Setup &amp; Service Selection</h2>
          <p>Tell us about your project — area of interest, services needed, detector type, and contact information.</p>
          <span class="badge">Start here</span>
        </div>
        <div class="card-arrow">→</div>
      </a>

    </div>

    <div class="site-footer">
      EDGE Geointelligence · info@edgeengineers.net
    </div>
  </main>
</body>
</html>
